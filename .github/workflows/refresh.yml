name: Refresh Stock Data

on:
  schedule:
    # 13:00 UTC = 6:30 PM IST (after Indian market close)
    - cron: '0 13 * * 1-5'
    # 22:00 UTC (after US market close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch stock prices and fundamentals
        run: python fetch_prices.py

      - name: Generate signal alerts
        run: python send_alert.py

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh stock data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Post job summary
        if: always()
        run: |
          if [ -f data/alerts.json ]; then
            ALERT_COUNT=$(python -c "import json; print(json.load(open('data/alerts.json'))['alertCount'])")
            echo "## Refresh Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$ALERT_COUNT" -gt "0" ]; then
              echo "**$ALERT_COUNT signal change(s) detected!** Check data/alerts.json for details." >> $GITHUB_STEP_SUMMARY
            else
              echo "No signal changes. All portfolio stocks stable." >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Data updated at: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Refresh Failed" >> $GITHUB_STEP_SUMMARY
            echo "data/alerts.json not found — check logs above." >> $GITHUB_STEP_SUMMARY
          fi
